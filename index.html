
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - CosmeticERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #009688;
            --primary-dark: #00796b;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --danger: #ff4d4f;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 400px; 
            border-top: 5px solid var(--primary);
            text-align: center;
        }

        h2 { margin-top: 0; color: var(--primary); font-weight: 700; }
        h3 { color: var(--text-main); font-weight: 600; }
        p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }

        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            margin-top: 15px; 
            width: 100%; 
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:active { transform: scale(0.98); }
        button:hover { background-color: var(--primary-dark); }
        
        .btn-danger { background-color: var(--danger); margin-bottom: 20px; }
        .btn-danger:hover { background-color: #d9363e; }
        
        .btn-secondary { background-color: #e2e8f0; color: var(--text-main); }
        .btn-secondary:hover { background-color: #cbd5e1; }

        select, input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        select:focus, input:focus { border-color: var(--primary); }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-top: 15px;
        }

        .file-upload-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-upload { background-color: var(--primary); }

        #qrcode { 
            margin-top: 25px; 
            display: flex; 
            justify-content: center; 
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .hidden { display: none; }
        
        .item-row { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
            align-items: center;
        }
        .item-row select { flex: 2; margin-top: 0; }
        .item-row input { flex: 1; margin-top: 0; text-align: center; }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card fade-in">
    <h2>Cosmetic Helper</h2>
    
    <div id="setup-section">
        <p>أهلاً بك! لتهيئة المساعد، برجاء رفع ملف قاعدة البيانات (JSON) الذي أرسله لك المدير.</p>
        <div class="file-upload-wrapper">
            <button class="btn-upload">اختيار ملف البيانات</button>
            <input type="file" id="file-input" accept=".json">
        </div>
    </div>

    <div id="app-section" class="hidden">
        <h3 id="mode-title">تجهيز طلب</h3>
        <button onclick="clearData()" class="btn-danger">تحديث / رفع ملف بيانات جديد</button>
        
        <div id="items-container">
        </div>
        
        <button onclick="addNewRow()" class="btn-secondary">+ إضافة صنف آخر</button>
        <button onclick="generateQR()">توليد كود الطلب (QR)</button>
        
        <div id="qrcode"></div>
    </div>
</div>

<script>
    let catalog = [];
    let appMode = 'SALE'; 

    window.onload = function() {
        const savedData = localStorage.getItem('helperCatalog');
        if (savedData) {
            catalog = JSON.parse(savedData);
            startApp();
        }
    };

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if(json.catalog) {
                    catalog = json.catalog;
                    localStorage.setItem('helperCatalog', JSON.stringify(catalog));
                    startApp();
                } else {
                    alert("ملف غير صالح");
                }
            } catch (err) {
                alert("حدث خطأ في قراءة الملف");
            }
        };
        reader.readAsText(file);
    });

    function startApp() {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        
        if(catalog.length > 0) {
            appMode = catalog[0].type;
            document.getElementById('mode-title').innerText = appMode === 'SALE' ? "تجهيز فاتورة مبيعات" : "جرد مخزن / إعادة تخزين";
        }
        addNewRow();
    }

    function addNewRow() {
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row fade-in';
        
        let selectHtml = `<select class="item-select"><option value="">اختر الصنف...</option>`;
        catalog.forEach(item => {
            selectHtml += `<option value="${item.id}">${item.name}</option>`;
        });
        selectHtml += `</select>`;
        
        row.innerHTML = selectHtml + `<input type="number" class="item-qty" placeholder="الكمية" min="1">`;
        container.appendChild(row);
    }

    function generateQR() {
        const rows = document.querySelectorAll('.item-row');
        let selectedItems = [];
        
        rows.forEach(row => {
            const id = row.querySelector('.item-select').value;
            const qty = parseFloat(row.querySelector('.item-qty').value);
            if (id && qty > 0) {
                selectedItems.push({ id: id, qty: qty });
            }
        });

        if (selectedItems.length === 0) {
            alert("برجاء اختيار صنف وكمية صحيحة");
            return;
        }

        const payload = {
            type: appMode,
            items: selectedItems
        };

        document.getElementById('qrcode').innerHTML = "";
        
        new QRCode(document.getElementById('qrcode'), {
            text: JSON.stringify(payload),
            width: 200,
            height: 200,
            colorDark : "#009688",
            colorLight : "#ffffff"
        });
    }

    function clearData() {
        if(confirm("هل أنت متأكد من مسح البيانات لرفع ملف جديد؟")) {
            localStorage.removeItem('helperCatalog');
            location.reload();
        }
    }
</script>

</body>
</html>
