<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع - CosmeticERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #009688;
            --primary-dark: #00796b;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --danger: #ff4d4f;
            --border: #e2e8f0;
            --success: #10b981;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
        }

        .card { 
            background: var(--card-bg); 
            padding: 25px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 450px; 
            border-top: 5px solid var(--primary);
        }

        h2 { margin-top: 0; color: var(--primary); font-weight: 700; text-align: center; margin-bottom: 5px;}
        .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px;}

        .total-box {
            background-color: #ecfdf5;
            border: 2px dashed var(--success);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; color: var(--text-muted); }
        .grand-total-row { display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 20px; font-weight: bold; color: var(--success); }

        button { 
            background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 16px; font-family: 'Cairo', sans-serif; font-weight: 600; margin-top: 10px; width: 100%; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-danger { background-color: var(--danger); margin-bottom: 15px; }
        .btn-secondary { background-color: #e2e8f0; color: var(--text-main); }
        .delete-btn { background-color: var(--danger); width: auto; padding: 12px 15px; margin-top: 5px; }

        select, input { 
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.2s;
        }
        select:focus, input:focus { border-color: var(--primary); }

        .form-group { margin-top: 15px; text-align: right; }
        .form-group label { font-size: 14px; font-weight: bold; color: var(--primary-dark); display: block; margin-bottom: 5px;}

        #new-client-fields { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed var(--border); display: none; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; padding: 15px; background: white; border-radius: 10px; border: 1px solid var(--border); }
        
        .hidden { display: none !important; }
        .item-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; background: #f8fafc; padding: 10px; border-radius: 8px;}
        .item-row select { flex: 2; margin-top: 0; }
        .item-row input { flex: 1; margin-top: 0; text-align: center; }
        
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card fade-in">
    <h2>نقاط البيع السريعة</h2>
    <p class="subtitle" id="shop-name">CosmeticERP</p>
    
    <div id="setup-section">
        <p style="text-align: center;">برجاء رفع ملف بيانات المحل (JSON) للبدء.</p>
        <input type="file" id="file-input" accept=".json" style="padding:0;">
    </div>

    <div id="app-section" class="hidden">
        <button onclick="clearData()" class="btn-danger">مسح وتحديث البيانات (ملف جديد)</button>
        
        <div class="form-group">
            <label>1. بيانات العميل</label>
            <select id="client-select" onchange="handleClientChange()">
                <option value="">عميل نقدي (بدون اسم)</option>
                <option value="NEW" style="font-weight: bold; color: var(--primary);">+ إضافة عميل جديد</option>
            </select>
            
            <div id="new-client-fields">
                <input type="text" id="new-client-name" placeholder="اسم العميل الجديد *" required>
                <input type="tel" id="new-client-phone" placeholder="رقم التليفون (اختياري)">
            </div>
        </div>

        <div class="form-group">
            <label>2. المنتجات المطلوبة</label>
            <div id="items-container"></div>
            <button onclick="addNewRow()" class="btn-secondary">+ إضافة صنف آخر</button>
        </div>

        <div class="form-group">
            <label>3. الخصم (بالجنيه)</label>
            <input type="number" id="discount-input" placeholder="0" min="0" oninput="calculateTotal()">
        </div>
        
        <div id="total-section" class="total-box">
            <div class="total-row"><span>المجموع:</span> <span id="sub-total">0</span></div>
            <div class="total-row"><span>الخصم:</span> <span id="discount-amount">0</span></div>
            <div class="grand-total-row"><span>الصافي المطلوب:</span> <span id="grand-total">0 EGP</span></div>
        </div>

        <button onclick="generateQR()" style="margin-top: 20px; font-size: 18px;">تأكيد وتوليد الفاتورة (QR)</button>
        
        <div id="qrcode"></div>
        <button id="download-btn" onclick="downloadQR()" class="btn-secondary hidden" style="margin-top: 15px; background-color: #cbd5e1;">حفظ الفاتورة كصورة</button>
    </div>
</div>

<script>
    let catalog = [];
    let clients = [];

    window.onload = function() {
        const savedData = localStorage.getItem('helperCatalog');
        if (savedData) {
            const data = JSON.parse(savedData);
            catalog = data.catalog || [];
            clients = data.clients || [];
            startApp();
        }
    };

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if(json.catalog) {
                    localStorage.setItem('helperCatalog', JSON.stringify(json));
                    catalog = json.catalog;
                    clients = json.clients || [];
                    startApp();
                } else { alert("ملف غير صالح"); }
            } catch (err) { alert("حدث خطأ في قراءة الملف"); }
        };
        reader.readAsText(file);
    });

    function startApp() {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        
        const clientSelect = document.getElementById('client-select');
        clientSelect.innerHTML = '<option value="">عميل نقدي (بدون اسم)</option><option value="NEW" style="font-weight: bold; color: #009688;">+ إضافة عميل جديد</option>';
        
        clients.forEach(c => {
            let option = document.createElement('option');
            option.value = c.id;
            option.text = c.name;
            clientSelect.add(option);
        });
        addNewRow();
    }

    function handleClientChange() {
        const select = document.getElementById('client-select');
        const newFields = document.getElementById('new-client-fields');
        newFields.style.display = select.value === 'NEW' ? 'block' : 'none';
    }

    function calculateTotal() {
        const rows = document.querySelectorAll('.item-row');
        let subTotal = 0;
        
        rows.forEach(row => {
            const select = row.querySelector('.item-select');
            const qtyInput = row.querySelector('.item-qty');
            if (select.value && qtyInput.value > 0) {
                const product = catalog.find(p => p.id === select.value);
                if (product && product.price) subTotal += (product.price * qtyInput.value);
            }
        });

        let discount = parseFloat(document.getElementById('discount-input').value) || 0;
        let grandTotal = subTotal - discount;
        if (grandTotal < 0) grandTotal = 0;

        const totalSection = document.getElementById('total-section');
        if (subTotal > 0) {
            totalSection.style.display = 'block';
            document.getElementById('sub-total').innerText = subTotal.toLocaleString();
            document.getElementById('discount-amount').innerText = discount.toLocaleString();
            document.getElementById('grand-total').innerText = grandTotal.toLocaleString() + ' EGP';
        } else {
            totalSection.style.display = 'none';
        }
    }

    function addNewRow() {
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row fade-in';
        
        let selectHtml = `<select class="item-select" onchange="calculateTotal()"><option value="">اختر الصنف...</option>`;
        catalog.forEach(item => {
            const priceText = item.price ? ` (${item.price} ج)` : '';
            selectHtml += `<option value="${item.id}">${item.name}${priceText}</option>`;
        });
        selectHtml += `</select>`;
        
        row.innerHTML = selectHtml + `
            <input type="number" class="item-qty" placeholder="الكمية" min="1" value="1" oninput="calculateTotal()">
            <button class="delete-btn" onclick="removeRow(this)">X</button>
        `;
        container.appendChild(row);
        calculateTotal();
    }

    function removeRow(btn) {
        btn.parentElement.remove();
        calculateTotal();
    }

    function generateQR() {
        const rows = document.querySelectorAll('.item-row');
        let selectedItems = [];
        
        rows.forEach(row => {
            const id = row.querySelector('.item-select').value;
            const qty = parseFloat(row.querySelector('.item-qty').value);
            if (id && qty > 0) selectedItems.push({ id: id, qty: qty });
        });

        if (selectedItems.length === 0) {
            alert("برجاء اختيار صنف واحد على الأقل"); return;
        }

        const clientSelect = document.getElementById('client-select').value;
        let payload = {
            type: "SALE",
            discount: parseFloat(document.getElementById('discount-input').value) || 0,
            items: selectedItems
        };

        if (clientSelect === 'NEW') {
            const newName = document.getElementById('new-client-name').value.trim();
            if (!newName) { alert("برجاء كتابة اسم العميل الجديد"); return; }
            payload.newClient = { name: newName, phone: document.getElementById('new-client-phone').value.trim() };
        } else if (clientSelect !== '') {
            payload.clientId = clientSelect;
        }

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), {
            text: JSON.stringify(payload),
            width: 220, height: 220,
            colorDark : "#009688", colorLight : "#ffffff"
        });

        setTimeout(() => document.getElementById('download-btn').classList.remove('hidden'), 500);
    }

    // دالة التحميل الجديدة (بترسم الإجمالي والاسم فوق الـ QR)
    function downloadQR() {
        const qrContainer = document.getElementById('qrcode');
        const originalCanvas = qrContainer.querySelector('canvas');
        const originalImg = qrContainer.querySelector('img');

        let qrSource = originalCanvas || originalImg;

        if (!qrSource) {
            alert("برجاء الانتظار حتى يكتمل رسم الكود");
            return;
        }

        // استخراج اسم العميل
        let clientName = "عميل نقدي";
        const clientSelect = document.getElementById('client-select');
        if (clientSelect.value === 'NEW') {
            const newName = document.getElementById('new-client-name').value.trim();
            if (newName) clientName = newName;
        } else if (clientSelect.value !== '') {
            clientName = clientSelect.options[clientSelect.selectedIndex].text;
        }

        // استخراج الإجمالي
        const grandTotalText = document.getElementById('grand-total').innerText;

        // إنشاء لوحة رسم جديدة
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const qrSize = 220;
        const padding = 20;
        const textHeight = 80;

        canvas.width = qrSize + (padding * 2);
        canvas.height = qrSize + textHeight + (padding * 2);

        // خلفية بيضاء
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // رسم النصوص
        ctx.textAlign = "center";
        
        ctx.fillStyle = "#009688";
        ctx.font = "bold 22px Arial";
        ctx.fillText(clientName, canvas.width / 2, padding + 25);
        
        ctx.fillStyle = "#10b981";
        ctx.font = "bold 24px Arial";
        ctx.fillText(grandTotalText, canvas.width / 2, padding + 60);

        // رسم الـ QR Code
        if (originalCanvas) {
            ctx.drawImage(originalCanvas, padding, padding + textHeight, qrSize, qrSize);
            triggerDownload(canvas.toDataURL("image/png"));
        } else if (originalImg && originalImg.src) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = function() {
                ctx.drawImage(img, padding, padding + textHeight, qrSize, qrSize);
                triggerDownload(canvas.toDataURL("image/png"));
            };
            img.src = originalImg.src;
        }
    }

    function triggerDownload(imgUrl) {
        const link = document.createElement('a');
        link.href = imgUrl;
        link.download = 'CosmeticERP_Order.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function clearData() {
        if(confirm("مسح البيانات لرفع ملف جديد؟")) {
            localStorage.removeItem('helperCatalog');
            location.reload();
        }
    }
</script>

</body>
</html>
