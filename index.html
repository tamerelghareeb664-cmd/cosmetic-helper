<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع - CosmeticERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <style>
        :root {
            --primary: #009688; --primary-dark: #00796b; --bg-color: #f0f4f8; --card-bg: #ffffff;
            --text-main: #333333; --text-muted: #666666; --danger: #ff4d4f; --border: #e2e8f0; --success: #10b981;
        }

        body { font-family: 'Cairo', sans-serif; padding: 15px; background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border-top: 5px solid var(--primary); }
        h2 { margin-top: 0; color: var(--primary); font-weight: 700; text-align: center; margin-bottom: 5px;}
        .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px;}

        /* تنسيق القوائم المخصصة */
        .custom-select-wrapper { position: relative; width: 100%; text-align: right; }
        .custom-select-trigger { 
            background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; 
            font-size: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s; font-weight: 600;
        }
        .custom-select-trigger:active { border-color: var(--primary); }
        .custom-select-trigger::after { content: '▼'; font-size: 12px; color: var(--primary); }
        
        .custom-options { 
            position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--primary); 
            border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); margin-top: 5px; z-index: 99; 
            max-height: 250px; overflow-y: auto; display: none; flex-direction: column;
        }
        .custom-options.open { display: flex; animation: slideDown 0.2s ease-out; }
        
        .search-box { padding: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #f8fafc; z-index: 2; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Cairo'; outline: none; font-size: 14px;}
        .search-box input:focus { border-color: var(--primary); }
        
        .custom-option { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; font-size: 15px; transition: 0.2s; }
        .custom-option:hover { background: #f0fdf4; color: var(--primary); }
        .custom-option.special { color: var(--primary); font-weight: bold; background: #e6fcf5; }
        
        /* تصميم صف المنتجات الجديد (رأسي) */
        .item-row { 
            display: flex; 
            flex-direction: column; /* التعديل هنا: العناصر تحت بعض */
            gap: 10px; 
            margin-top: 15px; 
            background: #f8fafc; 
            padding: 15px; 
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
        }
        .item-row .custom-select-wrapper { width: 100%; }
        
        /* صف الكمية والمسح */
        .qty-action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
        }
        .qty-action-row input.item-qty { 
            flex: 3; 
            margin-top: 0; 
            text-align: center; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-family: 'Cairo'; 
            font-size: 16px;
            font-weight: bold;
        }
        .qty-action-row .delete-btn { 
            flex: 1; 
            background: #fee2e2; 
            color: var(--danger); 
            padding: 12px; 
            margin: 0; 
            border-radius: 8px; 
            font-weight: bold;
        }
        .qty-action-row .delete-btn:hover { background: var(--danger); color: white; }

        .total-box { background-color: #ecfdf5; border: 2px dashed var(--success); padding: 15px; border-radius: 10px; margin: 20px 0; display: none; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; color: var(--text-muted); }
        .grand-total-row { display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 20px; font-weight: bold; color: var(--success); }

        button { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 16px; font-family: 'Cairo', sans-serif; font-weight: 600; margin-top: 10px; width: 100%; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-danger { background-color: var(--danger); margin-bottom: 15px; color: white;}
        .btn-secondary { background-color: #e2e8f0; color: var(--text-main); margin-top: 15px;}

        input.normal-input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input.normal-input:focus { border-color: var(--primary); }

        .form-group { margin-top: 20px; text-align: right; }
        .form-group label { font-size: 15px; font-weight: bold; color: var(--primary-dark); display: block; margin-bottom: 8px;}

        #new-client-fields { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed var(--border); display: none; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; padding: 15px; background: white; border-radius: 10px; border: 1px solid var(--border); }
        #qrcode canvas { max-width: 100%; height: auto; }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card fade-in">
    <h2>نقاط البيع السريعة</h2>
    <p class="subtitle" id="shop-name">CosmeticERP</p>
    
    <div id="setup-section">
        <p style="text-align: center;">برجاء رفع ملف بيانات المحل (TXT أو JSON) للبدء.</p>
        <div style="position: relative; overflow: hidden; display: inline-block; width: 100%; margin-top: 15px;">
            <button style="background-color: var(--primary);">اختيار ملف البيانات</button>
            <input type="file" id="file-input" accept=".json, .txt" style="font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;">
        </div>
    </div>

    <div id="app-section" class="hidden">
        <button onclick="clearData()" class="btn-danger">مسح وتحديث البيانات (ملف جديد)</button>
        
        <div class="form-group">
            <label>1. بيانات العميل</label>
            <div class="custom-select-wrapper" id="client-wrapper">
                <input type="hidden" id="client-value" value="">
                <div class="custom-select-trigger" onclick="toggleDropdown('client-options')">
                    <span id="client-text">عميل نقدي (بدون اسم)</span>
                </div>
                <div class="custom-options" id="client-options">
                    <div class="search-box">
                        <input type="text" placeholder="ابحث عن عميل..." onkeyup="filterOptions(this, 'client-list')">
                    </div>
                    <div id="client-list"></div>
                </div>
            </div>
            
            <div id="new-client-fields">
                <input type="text" id="new-client-name" class="normal-input" placeholder="اسم العميل الجديد *" required>
                <input type="tel" id="new-client-phone" class="normal-input" placeholder="رقم التليفون (اختياري)">
            </div>
        </div>

        <div class="form-group">
            <label>2. المنتجات المطلوبة</label>
            <div id="items-container"></div>
            <button onclick="addNewRow()" class="btn-secondary">+ إضافة صنف آخر</button>
        </div>

        <div class="form-group">
            <label>3. الخصم (بالجنيه)</label>
            <input type="number" id="discount-input" class="normal-input" placeholder="0" min="0" oninput="calculateTotal()">
        </div>
        
        <div id="total-section" class="total-box">
            <div class="total-row"><span>المجموع:</span> <span id="sub-total">0</span></div>
            <div class="total-row"><span>الخصم:</span> <span id="discount-amount">0</span></div>
            <div class="grand-total-row"><span>الصافي المطلوب:</span> <span id="grand-total">0 EGP</span></div>
        </div>

        <button onclick="generateQR()" style="margin-top: 25px; font-size: 18px; padding: 15px;">تأكيد وتوليد الفاتورة (QR)</button>
        
        <div id="qrcode"></div>
        <button id="download-btn" onclick="downloadQR()" class="btn-secondary hidden" style="margin-top: 15px;">حفظ الفاتورة كصورة</button>
    </div>
</div>

<script>
    let catalog = [];
    let clients = [];

    window.onload = function() {
        const savedData = localStorage.getItem('helperCatalog');
        if (savedData) {
            const data = JSON.parse(savedData);
            catalog = data.catalog || [];
            clients = data.clients || [];
            startApp();
        }
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.custom-select-wrapper')) {
                document.querySelectorAll('.custom-options').forEach(opt => opt.classList.remove('open'));
            }
        });
    };

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if(json.catalog) {
                    localStorage.setItem('helperCatalog', JSON.stringify(json));
                    catalog = json.catalog;
                    clients = json.clients || [];
                    startApp();
                } else { alert("ملف غير صالح"); }
            } catch (err) { alert("حدث خطأ في قراءة الملف"); }
        };
        reader.readAsText(file);
    });

    function startApp() {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        buildClientDropdown();
        addNewRow();
    }

    function toggleDropdown(id) {
        document.querySelectorAll('.custom-options').forEach(opt => {
            if(opt.id !== id) opt.classList.remove('open');
        });
        document.getElementById(id).classList.toggle('open');
    }

    function filterOptions(input, listId) {
        const filter = input.value.toUpperCase();
        const options = document.getElementById(listId).getElementsByClassName('custom-option');
        for (let i = 0; i < options.length; i++) {
            const txtValue = options[i].textContent || options[i].innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                options[i].style.display = "";
            } else {
                options[i].style.display = "none";
            }
        }
    }

    function selectClient(id, name) {
        document.getElementById('client-value').value = id;
        document.getElementById('client-text').innerText = name;
        document.getElementById('client-options').classList.remove('open');
        
        const newFields = document.getElementById('new-client-fields');
        newFields.style.display = id === 'NEW' ? 'block' : 'none';
    }

    function selectProduct(rowId, productId, productName, price) {
        document.getElementById(`prod-val-${rowId}`).value = productId;
        document.getElementById(`prod-text-${rowId}`).innerText = productName + (price ? ` (${price} ج)` : '');
        document.getElementById(`prod-options-${rowId}`).classList.remove('open');
        calculateTotal();
    }

    function buildClientDropdown() {
        const list = document.getElementById('client-list');
        let html = `<div class="custom-option" onclick="selectClient('', 'عميل نقدي (بدون اسم)')">عميل نقدي (بدون اسم)</div>`;
        html += `<div class="custom-option special" onclick="selectClient('NEW', '+ إضافة عميل جديد')">+ إضافة عميل جديد</div>`;
        
        clients.forEach(c => {
            html += `<div class="custom-option" onclick="selectClient('${c.id}', '${c.name.replace(/'/g, "\\'")}')">${c.name}</div>`;
        });
        list.innerHTML = html;
    }

    let rowCounter = 0;
    function addNewRow() {
        rowCounter++;
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row fade-in';
        row.id = `row-${rowCounter}`;
        
        let optionsHtml = '';
        catalog.forEach(item => {
            const priceText = item.price ? ` (${item.price} ج)` : '';
            const safeName = item.name.replace(/'/g, "\\'");
            optionsHtml += `<div class="custom-option" onclick="selectProduct(${rowCounter}, '${item.id}', '${safeName}', '${item.price || ''}')">${item.name}${priceText}</div>`;
        });

        row.innerHTML = `
            <div class="custom-select-wrapper">
                <input type="hidden" class="item-val" id="prod-val-${rowCounter}" value="">
                <div class="custom-select-trigger" onclick="toggleDropdown('prod-options-${rowCounter}')">
                    <span id="prod-text-${rowCounter}">اختر الصنف...</span>
                </div>
                <div class="custom-options" id="prod-options-${rowCounter}">
                    <div class="search-box">
                        <input type="text" placeholder="ابحث عن منتج..." onkeyup="filterOptions(this, 'prod-list-${rowCounter}')">
                    </div>
                    <div id="prod-list-${rowCounter}">
                        ${optionsHtml}
                    </div>
                </div>
            </div>
            
            <div class="qty-action-row">
                <input type="number" class="item-qty" placeholder="الكمية" min="1" value="1" oninput="calculateTotal()">
                <button class="delete-btn" onclick="removeRow(this)">مسح</button>
            </div>
        `;
        container.appendChild(row);
        calculateTotal();
    }

    function removeRow(btn) {
        btn.parentElement.parentElement.remove();
        calculateTotal();
    }

    function calculateTotal() {
        const rows = document.querySelectorAll('.item-row');
        let subTotal = 0;
        
        rows.forEach(row => {
            const valInput = row.querySelector('.item-val');
            const qtyInput = row.querySelector('.item-qty');
            if (valInput && valInput.value && qtyInput.value > 0) {
                const product = catalog.find(p => p.id === valInput.value);
                if (product && product.price) subTotal += (product.price * qtyInput.value);
            }
        });

        let discount = parseFloat(document.getElementById('discount-input').value) || 0;
        let grandTotal = subTotal - discount;
        if (grandTotal < 0) grandTotal = 0;

        const totalSection = document.getElementById('total-section');
        if (subTotal > 0) {
            totalSection.style.display = 'block';
            document.getElementById('sub-total').innerText = subTotal.toLocaleString();
            document.getElementById('discount-amount').innerText = discount.toLocaleString();
            document.getElementById('grand-total').innerText = grandTotal.toLocaleString() + ' EGP';
        } else {
            totalSection.style.display = 'none';
        }
    }

    function generateQR() {
        const rows = document.querySelectorAll('.item-row');
        let selectedItems = [];
        
        rows.forEach(row => {
            const valInput = row.querySelector('.item-val');
            const qtyInput = row.querySelector('.item-qty');
            if (valInput && valInput.value) {
                const qty = parseFloat(qtyInput.value);
                if (qty > 0) selectedItems.push({ id: valInput.value, qty: qty });
            }
        });

        if (selectedItems.length === 0) {
            alert("برجاء اختيار صنف واحد على الأقل"); return;
        }

        const clientVal = document.getElementById('client-value').value;
        let payload = {
            type: "SALE",
            discount: parseFloat(document.getElementById('discount-input').value) || 0,
            items: selectedItems
        };

        if (clientVal === 'NEW') {
            const newName = document.getElementById('new-client-name').value.trim();
            if (!newName) { alert("برجاء كتابة اسم العميل الجديد"); return; }
            payload.newClient = { name: newName, phone: document.getElementById('new-client-phone').value.trim() };
        } else if (clientVal !== '') {
            payload.clientId = clientVal;
        }

        document.getElementById('qrcode').innerHTML = "";
        const canvas = document.createElement('canvas');
        document.getElementById('qrcode').appendChild(canvas);

        try {
            new QRious({
                element: canvas,
                value: JSON.stringify(payload),
                size: 250,
                level: 'L',
                background: '#ffffff',
                foreground: '#000000'
            });
            setTimeout(() => document.getElementById('download-btn').classList.remove('hidden'), 500);
        } catch (e) {
            alert("حجم البيانات كبير جداً، يرجى تقليل الأصناف.");
        }
    }

    function downloadQR() {
        const qrContainer = document.getElementById('qrcode');
        const originalCanvas = qrContainer.querySelector('canvas');

        if (!originalCanvas) { alert("برجاء الانتظار حتى يكتمل رسم الكود"); return; }

        let clientName = document.getElementById('client-text').innerText;
        if (document.getElementById('client-value').value === 'NEW') {
            const newName = document.getElementById('new-client-name').value.trim();
            if (newName) clientName = newName;
        }

        const grandTotalText = document.getElementById('grand-total').innerText;

        const exportCanvas = document.createElement('canvas');
        const ctx = exportCanvas.getContext('2d');

        const qrSize = 250; const padding = 20; const textHeight = 80;

        exportCanvas.width = qrSize + (padding * 2);
        exportCanvas.height = qrSize + textHeight + (padding * 2);

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        ctx.textAlign = "center";
        ctx.fillStyle = "#009688";
        ctx.font = "bold 22px Cairo, Arial";
        ctx.fillText(clientName, exportCanvas.width / 2, padding + 25);
        
        ctx.fillStyle = "#10b981";
        ctx.font = "bold 24px Arial";
        ctx.fillText(grandTotalText, exportCanvas.width / 2, padding + 60);

        ctx.drawImage(originalCanvas, padding, padding + textHeight, qrSize, qrSize);
        
        const link = document.createElement('a');
        link.href = exportCanvas.toDataURL("image/png");
        link.download = 'CosmeticERP_Order.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function clearData() {
        if(confirm("مسح البيانات لرفع ملف جديد؟")) {
            localStorage.removeItem('helperCatalog');
            location.reload();
        }
    }
</script>

</body>
</html>
